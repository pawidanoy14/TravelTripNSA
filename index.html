<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CJx Staytrip — ระบบจองที่พักพนักงาน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ====== ใส่ค่าของคุณ 2 บรรทัดด้านล่างในไฟล์ (ในแท็ก <script id="config">) ====== */
  :root{
    --cj-yellow:#FFDD00;--cj-yellow-deep:#FDB813;--cj-red:#EF2F3C;--cj-red-promo:#E51E25;
    --cj-blue:#1D4793;--cj-blue-bright:#23AAE0;--cj-green:#00A14B;--cj-green-deep:#007A3A;
    --cj-ink:#2B1A12;--cj-ink-soft:#5A4A40;--cj-paper:#FFFFFF;--cj-paper-warm:#FBF7EE;
    --cj-line:#E7DFD2;--cj-mute:#9A8E80;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Anuphan',system-ui,sans-serif;color:var(--cj-ink);background:var(--cj-paper-warm);}
  a{color:var(--cj-blue);text-decoration:none;font-weight:600;}
  input,select,button{font-family:inherit;font-size:15px;}
  input:focus,select:focus{outline:none;border-color:var(--cj-blue);box-shadow:0 0 0 3px rgba(29,71,147,.14);}
  ::placeholder{color:var(--cj-mute);}
  .wrap{min-height:100vh;display:flex;flex-direction:column;}
  header{background:var(--cj-yellow);padding:14px 24px;display:flex;align-items:center;gap:16px;border-bottom:4px solid var(--cj-yellow-deep);flex-wrap:wrap;}
  .logo{width:50px;height:50px;border-radius:14px;background:#fff;box-shadow:0 3px 0 rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--cj-red);font-size:20px;flex:none;}
  .brand-t{font-weight:700;font-size:21px;color:var(--cj-blue);line-height:1;}
  .brand-s{font-weight:600;font-size:13px;color:var(--cj-ink-soft);}
  .grow{flex:1;}
  .roles{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.55);padding:5px;border-radius:999px;}
  .roles span{font-size:12px;font-weight:700;color:var(--cj-ink-soft);padding-left:10px;}
  .pill{padding:9px 20px;border:none;border-radius:999px;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;background:transparent;color:var(--cj-ink-soft);}
  .pill.on{background:var(--cj-blue);color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.12);}
  nav{background:var(--cj-blue);padding:10px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .tab{padding:10px 22px;border:none;border-radius:999px;font-weight:700;font-size:15px;cursor:pointer;transition:.15s;background:transparent;color:#cdd8ee;}
  .tab.on{background:#fff;color:var(--cj-blue);}
  .badge{background:var(--cj-red-promo);color:#fff;font-size:12px;font-weight:700;min-width:22px;height:22px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;margin-left:8px;}
  main{flex:1;padding:26px 24px;max-width:1200px;width:100%;margin:0 auto;}
  h1{font-size:26px;margin:0 0 4px;color:var(--cj-blue);}
  .sub{color:var(--cj-ink-soft);font-weight:600;margin:0 0 20px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:22px;}
  .card{background:#fff;border-radius:16px;padding:18px 20px;border-top:5px solid var(--cj-blue);box-shadow:0 2px 0 var(--cj-line);}
  .card.g{border-top-color:var(--cj-green);}.card.y{border-top-color:var(--cj-yellow-deep);}.card.r{border-top-color:var(--cj-red);}
  .card .k{font-size:13px;color:var(--cj-ink-soft);font-weight:600;}
  .card .v{font-size:30px;font-weight:700;margin-top:4px;}
  .card .n{font-size:12px;color:var(--cj-mute);margin-top:4px;}
  .panel{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 0 var(--cj-line);margin-bottom:18px;}
  .panel h2{font-size:18px;margin:0 0 14px;color:var(--cj-ink);}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--cj-line);}
  th{color:var(--cj-ink-soft);font-weight:700;font-size:13px;}
  .tag{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;}
  .t-pending{background:#FFF3D6;color:#8a6300;}.t-booked{background:#E4F5EB;color:var(--cj-green-deep);}.t-voucher{background:#E7EEF9;color:var(--cj-blue);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;flex:1;min-width:200px;}
  .field label{font-size:13px;font-weight:700;color:var(--cj-ink-soft);}
  .field input,.field select{padding:11px 12px;border:2px solid var(--cj-line);border-radius:10px;background:#fff;}
  .types{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
  .type{padding:16px;border:2px solid var(--cj-line);border-radius:12px;cursor:pointer;background:#fff;transition:.15s;}
  .type.on{border:3px solid var(--cj-blue);background:#E7EEF9;}
  .type .tt{font-weight:700;font-size:16px;}.type .td{font-size:13px;color:var(--cj-ink-soft);}
  .btn{padding:12px 26px;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;background:var(--cj-blue);color:#fff;box-shadow:0 3px 0 var(--cj-green-deep);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn.ghost{background:#fff;color:var(--cj-blue);border:2px solid var(--cj-line);box-shadow:none;}
  .btn.y{background:var(--cj-yellow-deep);color:var(--cj-ink);box-shadow:0 3px 0 #b57f00;}
  .alloc{border:2px solid var(--cj-line);border-radius:12px;padding:14px;margin-bottom:10px;}
  .search{padding:11px 14px;border:2px solid var(--cj-line);border-radius:10px;width:280px;max-width:100%;}
  .filters{display:flex;gap:8px;margin:10px 0 16px;flex-wrap:wrap;}
  .fpill{padding:8px 16px;border:none;border-radius:999px;font-weight:700;font-size:14px;cursor:pointer;background:#EEE9DD;color:var(--cj-ink-soft);}
  .fpill.on{background:var(--cj-blue);color:#fff;}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--cj-green);color:#fff;font-weight:700;padding:14px 28px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:50;}
  .empty{text-align:center;color:var(--cj-mute);padding:34px;font-weight:600;}
  .setup{max-width:640px;margin:60px auto;background:#fff;border-radius:16px;padding:32px;box-shadow:0 2px 0 var(--cj-line);}
  .setup code{background:#F1EFE8;padding:2px 6px;border-radius:6px;font-size:14px;}
  .bar{height:10px;border-radius:6px;background:var(--cj-line);overflow:hidden;margin-top:4px;}
  .bar>i{display:block;height:100%;background:var(--cj-blue-bright);}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="toast"></div>

<script id="config">
  /* ====================================================== */
  /*  ใส่ค่าของโปรเจกต์ Supabase ของคุณตรงนี้ (2 บรรทัด)      */
  /*  URL: ใส่ไว้ให้แล้ว | anon key: หาได้ที่                 */
  /*  Supabase > Settings > API > Project API keys > "anon public" */
  /* ====================================================== */
  const SUPABASE_URL = "https://kenubfeidconknehpmsi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlbnViZmVpZGNvbmtuZWhwbXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MTIxNjYsImV4cCI6MjEwMDI4ODE2Nn0.oeFI-LxhqbY1pS8P9dMEzXrkXIbOcbifxRvAcUy7mRs";
</script>

<script>
const TYPE_LABEL = { survey:"สำรวจพื้นที่", fair:"งานแฟร์", open:"งานเปิดสาขา" };
const TYPE_DESC  = { survey:"ลงพื้นที่สำรวจ / หาทำเล", fair:"ออกบูธ / งานแสดงสินค้า", open:"เปิดสาขาใหม่ / ปรับปรุงสาขา" };
const baht = n => "฿" + Math.round(n||0).toLocaleString();
const fmtDate = s => { if(!s) return "—"; const d=new Date(s); return d.toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"}); };
const nightsBetween = (a,b) => { if(!a||!b) return 0; const d=(new Date(b)-new Date(a))/86400000; return d>0?Math.round(d):0; };

let sb=null;
const S = {
  role:"staff", execTab:"dashboard", staffTab:"book",
  branches:[], plans:[], hotelCache:{},
  filter:"all", search:"", myName:"",
  draft:{ planType:"", team:"", bookedBy:"", branch:"", checkIn:"", checkOut:"", allocs:[] }
};

function toast(msg){ const t=document.getElementById("toast"); t.innerHTML='<div class="toast">'+msg+'</div>'; setTimeout(()=>t.innerHTML="",2600); }

async function init(){
  if(!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY==="PASTE_ANON_KEY_HERE"){ renderSetup(); return; }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  await Promise.all([loadBranches(), loadPlans()]);
  render();
}
async function loadBranches(){
  const {data,error} = await sb.from("branches").select("code,name").order("code");
  if(error){ console.error(error); toast("โหลดสาขาไม่สำเร็จ"); return; }
  S.branches = data||[];
}
async function loadPlans(){
  const {data,error} = await sb.from("plans").select("*").order("created_at",{ascending:false});
  if(error){ console.error(error); toast("โหลดแผนไม่สำเร็จ"); return; }
  S.plans = data||[];
}
async function loadHotels(code){
  if(S.hotelCache[code]) return S.hotelCache[code];
  const {data,error} = await sb.from("hotels").select("name,price").eq("branch_code",code).order("price");
  if(error){ console.error(error); return []; }
  S.hotelCache[code] = data||[]; return data||[];
}

/* ---------- metrics ---------- */
function metrics(){
  const p=S.plans, total=p.length;
  const cost=p.reduce((s,x)=>s+(+x.cost||0),0);
  const pn=p.reduce((s,x)=>s+(+x.person_nights||0),0);
  const rooms=p.reduce((s,x)=>s+(+x.room_count||0),0);
  const teams={};
  p.forEach(x=>{ if(x.team){ teams[x.team]=teams[x.team]||{cost:0,n:0}; teams[x.team].cost+=(+x.cost||0); teams[x.team].n++; } });
  const top=Object.entries(teams).map(([t,v])=>({team:t,...v})).sort((a,b)=>b.cost-a.cost).slice(0,6);
  return {total,cost,pn,rooms,avgPN: pn?cost/pn:0, avgPlan: total?cost/total:0, top};
}

/* ---------- render ---------- */
function render(){
  const app=document.getElementById("app");
  app.innerHTML = header() + nav() + '<main>'+ (S.role==="exec"
      ? (S.execTab==="dashboard"?dashboard():plansList())
      : (S.staffTab==="book"?bookForm():myPlans())) + '</main>';
  bindTopBar();
}
function header(){
  return '<header>'
    +'<div class="logo">CJx</div>'
    +'<div><div class="brand-t">CJx Staytrip</div><div class="brand-s">ระบบจองที่พักพนักงานภาคสนาม</div></div>'
    +'<div class="grow"></div>'
    +'<div class="roles"><span>มุมมอง</span>'
    +'<button class="pill '+(S.role==="exec"?"on":"")+'" data-role="exec">ผู้บริหาร</button>'
    +'<button class="pill '+(S.role==="staff"?"on":"")+'" data-role="staff">พนักงาน</button></div>'
    +'</header>';
}
function nav(){
  if(S.role==="exec"){
    return '<nav>'
      +'<button class="tab '+(S.execTab==="dashboard"?"on":"")+'" data-etab="dashboard">แดชบอร์ด</button>'
      +'<button class="tab '+(S.execTab==="plans"?"on":"")+'" data-etab="plans">รวมแผนการจอง<span class="badge">'+S.plans.length+'</span></button>'
      +'</nav>';
  }
  return '<nav>'
    +'<button class="tab '+(S.staffTab==="book"?"on":"")+'" data-stab="book">＋ จองที่พัก</button>'
    +'<button class="tab '+(S.staffTab==="mine"?"on":"")+'" data-stab="mine">แผนจองของฉัน</button>'
    +'</nav>';
}
function bindTopBar(){
  document.querySelectorAll("[data-role]").forEach(b=>b.onclick=()=>{S.role=b.dataset.role;render();});
  document.querySelectorAll("[data-etab]").forEach(b=>b.onclick=()=>{S.execTab=b.dataset.etab;render();});
  document.querySelectorAll("[data-stab]").forEach(b=>b.onclick=()=>{S.staffTab=b.dataset.stab;render();});
}

function statusTag(s){ const m={pending:"รออนุมัติ",booked:"จองแล้ว",voucher:"วอยเชอร์"}; return '<span class="tag t-'+s+'">'+(m[s]||s)+'</span>'; }

/* ---------- exec dashboard ---------- */
function dashboard(){
  const m=metrics();
  let top = m.top.map((t,i)=>{
    const w = m.top[0].cost? Math.round(t.cost/m.top[0].cost*100):0;
    return '<tr><td><b>'+(i+1)+'. '+t.team+'</b> <span style="color:var(--cj-mute)">('+t.n+' แผน)</span>'
      +'<div class="bar"><i style="width:'+w+'%"></i></div></td>'
      +'<td style="text-align:right;color:var(--cj-green-deep);font-weight:700">'+baht(t.cost)+'</td></tr>';
  }).join("") || '<tr><td class="empty">ยังไม่มีข้อมูล</td></tr>';
  let recent = S.plans.slice(0,6).map(p=>rowPlan(p)).join("") || '<tr><td colspan="6" class="empty">ยังไม่มีแผนการจอง</td></tr>';
  return '<h1>แดชบอร์ดผู้บริหาร</h1><p class="sub">ภาพรวมค่าใช้จ่ายที่พัก · '+S.branches.length+' สาขา</p>'
    +'<div class="cards">'
    +'<div class="card"><div class="k">แผนการจองทั้งหมด</div><div class="v">'+m.total+'</div><div class="n">รวมทุกสถานะ</div></div>'
    +'<div class="card g"><div class="k">ค่าใช้จ่ายที่พักรวม</div><div class="v">'+baht(m.cost)+'</div><div class="n">'+m.pn.toLocaleString()+' คน-คืน · '+m.rooms.toLocaleString()+' ห้อง</div></div>'
    +'<div class="card y"><div class="k">ค่าที่พักเฉลี่ย / คน / คืน</div><div class="v">'+baht(m.avgPN)+'</div><div class="n">เกณฑ์งบ ฿650</div></div>'
    +'<div class="card r"><div class="k">เฉลี่ยที่พัก / แผน</div><div class="v">'+baht(m.avgPlan)+'</div></div>'
    +'</div>'
    +'<div class="row"><div class="panel" style="flex:1;min-width:300px"><h2>ทีมที่ค่าใช้จ่ายสูงสุด</h2><table>'+top+'</table></div></div>'
    +'<div class="panel"><h2>แผนการจองล่าสุด</h2><table><thead><tr><th>รหัส</th><th>ทีม/สาขา</th><th>ที่พัก</th><th>วันเข้าพัก</th><th>ค่าใช้จ่าย</th><th>สถานะ</th></tr></thead><tbody>'+recent+'</tbody></table></div>';
}
function rowPlan(p){
  return '<tr><td><b>'+(p.code||p.id)+'</b></td>'
    +'<td>'+(p.branch_name||"—")+'<div style="color:var(--cj-mute);font-size:12px">'+(p.team||"")+'</div></td>'
    +'<td>'+(p.branch_name||"—")+'</td>'
    +'<td>'+fmtDate(p.check_in)+'</td>'
    +'<td><b>'+baht(p.cost)+'</b></td>'
    +'<td>'+statusTag(p.status)+'</td></tr>';
}

/* ---------- exec plans list ---------- */
function plansList(){
  const f=S.plans.filter(p=>(S.filter==="all"||p.status===S.filter) &&
     (!S.search || (p.code||"").includes(S.search) || (p.team||"").includes(S.search) || (p.branch_name||"").includes(S.search)));
  const rows=f.map(p=>rowPlan(p)).join("") || '<tr><td colspan="6" class="empty">ไม่พบแผนที่ตรงกับเงื่อนไข</td></tr>';
  const fp=(k,l)=>'<button class="fpill '+(S.filter===k?"on":"")+'" data-f="'+k+'">'+l+'</button>';
  setTimeout(()=>{
    const s=document.getElementById("srch"); if(s){s.oninput=e=>{S.search=e.target.value; drawPlansTable();};}
    document.querySelectorAll("[data-f]").forEach(b=>b.onclick=()=>{S.filter=b.dataset.f; drawPlansTable(); document.querySelectorAll("[data-f]").forEach(x=>x.classList.toggle("on",x.dataset.f===S.filter));});
  });
  return '<h1>รวมแผนการจอง</h1><p class="sub">ทั้งหมด '+S.plans.length+' แผน</p>'
    +'<input id="srch" class="search" placeholder="ค้นหา รหัส / ทีม / สาขา" value="'+S.search+'">'
    +'<div class="filters">'+fp("all","ทั้งหมด")+fp("pending","รออนุมัติ")+fp("booked","จองแล้ว")+fp("voucher","วอยเชอร์")+'</div>'
    +'<div class="panel"><table><thead><tr><th>รหัส</th><th>ทีม/สาขา</th><th>ที่พัก</th><th>วันเข้าพัก</th><th>ค่าใช้จ่าย</th><th>สถานะ</th></tr></thead><tbody id="ptbody">'+rows+'</tbody></table></div>';
}
function drawPlansTable(){
  const f=S.plans.filter(p=>(S.filter==="all"||p.status===S.filter) &&
     (!S.search || (p.code||"").includes(S.search) || (p.team||"").includes(S.search) || (p.branch_name||"").includes(S.search)));
  const tb=document.getElementById("ptbody"); if(tb) tb.innerHTML=f.map(p=>rowPlan(p)).join("")||'<tr><td colspan="6" class="empty">ไม่พบแผน</td></tr>';
}

/* ---------- staff: my plans ---------- */
function myPlans(){
  const mine = S.myName ? S.plans.filter(p=>p.booked_by===S.myName||p.team===S.myName) : S.plans.slice(0,20);
  const rows=mine.map(p=>rowPlan(p)).join("") || '<tr><td colspan="6" class="empty">ยังไม่มีแผนจอง — เริ่มที่แท็บ "จองที่พัก"</td></tr>';
  return '<h1>แผนจองของฉัน</h1><p class="sub">'+(S.myName?('ของ '+S.myName):'แผนล่าสุดในระบบ')+'</p>'
    +'<div class="panel"><table><thead><tr><th>รหัส</th><th>ทีม/สาขา</th><th>ที่พัก</th><th>วันเข้าพัก</th><th>ค่าใช้จ่าย</th><th>สถานะ</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

/* ---------- staff: booking form ---------- */
function bookForm(){
  const d=S.draft;
  const nights=nightsBetween(d.checkIn,d.checkOut);
  const brOpts='<option value="">— เลือกสาขา —</option>'+S.branches.map(b=>'<option value="'+b.code+'" '+(d.branch===b.code?"selected":"")+'>'+b.code+' — '+b.name+'</option>').join("");
  const typeCards=Object.keys(TYPE_LABEL).map(k=>'<div class="type '+(d.planType===k?"on":"")+'" data-type="'+k+'"><div class="tt">'+TYPE_LABEL[k]+'</div><div class="td">'+TYPE_DESC[k]+'</div></div>').join("");
  const allocsHtml = d.allocs.map((a,i)=>allocRow(a,i)).join("") || '<div class="empty">ยังไม่มีห้องพัก — เลือกสาขาแล้วกด "＋ เพิ่มห้องพัก"</div>';
  const totals=calcTotals();
  setTimeout(bindBook);
  return '<h1>จองที่พักปฏิบัติงาน</h1><p class="sub">กรอกแผนการจอง แล้วส่งให้ผู้บริหารอนุมัติ</p>'
    +'<div class="panel">'
    +'<label style="font-weight:700;font-size:13px;color:var(--cj-ink-soft)">ประเภทงาน</label>'
    +'<div class="types">'+typeCards+'</div>'
    +'<div class="row">'
      +'<div class="field"><label>ทีม / หน่วยงาน</label><input id="f-team" placeholder="เช่น SMA9" value="'+(d.team||"")+'"></div>'
      +'<div class="field"><label>ผู้ขอจอง (หัวหน้าทีม)</label><input id="f-by" placeholder="ชื่อ-นามสกุล" value="'+(d.bookedBy||"")+'"></div>'
    +'</div>'
    +'<div class="field"><label>สาขาที่ไปปฏิบัติงาน</label><select id="f-branch">'+brOpts+'</select></div>'
    +'<div class="row">'
      +'<div class="field"><label>วันเข้าพัก</label><input type="date" id="f-in" value="'+(d.checkIn||"")+'"></div>'
      +'<div class="field"><label>วันออก</label><input type="date" id="f-out" value="'+(d.checkOut||"")+'"></div>'
      +'<div class="field"><label>จำนวนคืน</label><input value="'+nights+'" disabled></div>'
    +'</div>'
    +'</div>'
    +'<div class="panel"><div class="row" style="justify-content:space-between;align-items:center"><h2 style="margin:0">จัดห้องพัก</h2>'
    +'<button class="btn ghost" id="add-alloc" '+(d.branch?"":"disabled")+'>＋ เพิ่มห้องพัก</button></div>'
    +'<div style="margin-top:14px">'+allocsHtml+'</div>'
    +'<div style="text-align:right;margin-top:10px;font-weight:700">รวม '+totals.rooms+' ห้อง · '+totals.persons+' คน · '+baht(totals.cost)+'</div>'
    +'</div>'
    +'<div style="text-align:right"><button class="btn" id="submit" '+(canSubmit()?"":"disabled")+'>ส่งแผนการจอง</button></div>';
}
function allocRow(a,i){
  const hotels=S.hotelCache[S.draft.branch]||[];
  const opts='<option value="">— เลือกที่พัก —</option>'+hotels.map(h=>'<option value="'+h.name+'" '+(a.hotel===h.name?"selected":"")+'>'+h.name+' ('+baht(h.price)+')</option>').join("");
  return '<div class="alloc"><div class="row">'
    +'<div class="field" style="min-width:240px"><label>ที่พัก</label><select data-ai="'+i+'" data-af="hotel">'+opts+'</select></div>'
    +'<div class="field"><label>จำนวนห้อง</label><input type="number" min="1" data-ai="'+i+'" data-af="rooms" value="'+(a.rooms||1)+'"></div>'
    +'<div class="field"><label>จำนวนคน</label><input type="number" min="1" data-ai="'+i+'" data-af="persons" value="'+(a.persons||1)+'"></div>'
    +'<div class="field" style="max-width:90px;justify-content:flex-end"><button class="btn ghost" data-del="'+i+'" style="padding:11px">ลบ</button></div>'
    +'</div></div>';
}
function calcTotals(){
  const nights=nightsBetween(S.draft.checkIn,S.draft.checkOut);
  const hotels=S.hotelCache[S.draft.branch]||[];
  let rooms=0,persons=0,cost=0;
  S.draft.allocs.forEach(a=>{
    const h=hotels.find(x=>x.name===a.hotel); const price=h?+h.price:0;
    rooms+=+a.rooms||0; persons+=+a.persons||0; cost+=(+a.rooms||0)*price*nights;
  });
  return {rooms,persons,cost,nights};
}
function canSubmit(){
  const d=S.draft;
  return d.planType && d.team && d.branch && d.checkIn && d.checkOut && nightsBetween(d.checkIn,d.checkOut)>0
    && d.allocs.length>0 && d.allocs.every(a=>a.hotel && (+a.rooms>0) && (+a.persons>0));
}
function bindBook(){
  document.querySelectorAll("[data-type]").forEach(el=>el.onclick=()=>{S.draft.planType=el.dataset.type; render();});
  const team=document.getElementById("f-team"); if(team) team.oninput=e=>S.draft.team=e.target.value;
  const by=document.getElementById("f-by"); if(by) by.oninput=e=>S.draft.bookedBy=e.target.value;
  const inp=document.getElementById("f-in"); if(inp) inp.onchange=e=>{S.draft.checkIn=e.target.value; render();};
  const outp=document.getElementById("f-out"); if(outp) outp.onchange=e=>{S.draft.checkOut=e.target.value; render();};
  const br=document.getElementById("f-branch"); if(br) br.onchange=async e=>{ S.draft.branch=e.target.value; S.draft.allocs=[]; if(e.target.value) await loadHotels(e.target.value); render(); };
  const add=document.getElementById("add-alloc"); if(add) add.onclick=()=>{ S.draft.allocs.push({hotel:"",rooms:1,persons:1}); render(); };
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{S.draft.allocs.splice(+b.dataset.del,1); render();});
  document.querySelectorAll("[data-ai]").forEach(el=>{
    const ev = el.tagName==="SELECT"?"onchange":"oninput";
    el[ev]=e=>{ const i=+el.dataset.ai, f=el.dataset.af; S.draft.allocs[i][f]=e.target.value; if(f==="hotel") render(); else refreshTotals(); };
  });
  const sub=document.getElementById("submit"); if(sub) sub.onclick=submitBooking;
}
function refreshTotals(){ render(); }

async function submitBooking(){
  if(!canSubmit()) return;
  const d=S.draft, t=calcTotals(), hotels=S.hotelCache[d.branch]||[];
  const branch=S.branches.find(b=>b.code===d.branch);
  const id="WEB-"+Date.now();
  const plan={ id, code:d.branch, branch_code:d.branch, branch_name:branch?branch.name:d.branch,
    plan_type:d.planType, team:d.team, booked_by:d.bookedBy, check_in:d.checkIn, check_out:d.checkOut,
    nights:t.nights, status:"pending", cost:t.cost, persons:t.persons, room_count:t.rooms,
    person_nights:t.persons*t.nights, imported:false };
  const {error:e1}=await sb.from("plans").insert(plan);
  if(e1){ console.error(e1); toast("บันทึกไม่สำเร็จ: "+e1.message); return; }
  const allocs=d.allocs.map(a=>{ const h=hotels.find(x=>x.name===a.hotel); const price=h?+h.price:0;
    return {plan_id:id, hotel_name:a.hotel, rooms:+a.rooms, male:0, female:0, persons:+a.persons, price, nights:t.nights, cost:(+a.rooms)*price*t.nights}; });
  const {error:e2}=await sb.from("allocations").insert(allocs);
  if(e2){ console.error(e2); toast("บันทึกห้องพักไม่สำเร็จ"); }
  S.myName=d.bookedBy||d.team;
  S.draft={ planType:"", team:"", bookedBy:"", branch:"", checkIn:"", checkOut:"", allocs:[] };
  await loadPlans();
  toast("ส่งแผนการจองแล้ว รออนุมัติ");
  S.staffTab="mine"; render();
}

    +'<p class="sub">เปิดไฟล์ <code>index.html</code> นี้ แล้วแก้บรรทัด <code>SUPABASE_ANON_KEY</code></p>'
    +'<ol style="line-height:2">'

    +'<li>คัดลอกค่า <b>anon public</b> (ขึ้นต้นด้วย <code>eyJ...</code>)</li>'
    +'<li>วางแทนคำว่า <code>PASTE_ANON_KEY_HERE</code> ในไฟล์</li>'
    +'<li>บันทึกไฟล์ แล้วรีเฟรชหน้านี้</li></ol>'
    +'<p style="color:var(--cj-mute)">anon key เป็นคีย์สาธารณะ ออกแบบมาให้ฝังในหน้าเว็บได้ ปลอดภัยเมื่อคุณตั้งกฎ RLS ไว้แล้ว (สคริปต์ schema ตั้งให้แล้ว)</p>'
    +'</div>';
}

window.addEventListener("DOMContentLoaded", init);
</script>
